server {
    listen 80;
    server_name _;

    # ── Static files ─────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression (helpful on t2.micro — reduces network transfer)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_vary on;

    # Cache static assets aggressively; let the browser revalidate HTML
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback (React Router) ───────────────────────────────
    location / {
        try_files $uri /index.html;
    }

    # ── API reverse proxy → backend Kubernetes ClusterIP ─────────
    #
    # In Kubernetes the frontend Pod resolves "backend" via the
    # backend Service name (ClusterIP: backend:5000).
    # Nginx rewrites  /api/products  →  http://backend:5000/api/products
    # The trailing slash is deliberately ABSENT so the full URI is
    # forwarded intact (including the /api prefix the FastAPI app expects).
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;

        # Forward real client information
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep-alive for lower latency on repeat requests
        proxy_set_header   Connection        "";

        # Sensible timeouts for a t2.micro environment
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;
    }
}