# ════════════════════════════════════════════════════════════════
#  PostgreSQL — Deployment + ClusterIP Service
#
#  ClusterIP: reachable only inside the cluster as "postgres:5432"
#  Credentials are injected via a Secret (postgres-secret).
# ════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: default
type: Opaque
stringData:          # stringData auto-base64-encodes the values
  POSTGRES_USER:     admin
  POSTGRES_PASSWORD: admin
  POSTGRES_DB:       ecommerce

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi       # Keep small for t2.micro

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: default
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  strategy:
    type: Recreate      # Required for single-replica + PVC
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine   # Alpine variant — smaller image
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "admin"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: default
spec:
  type: ClusterIP      # Not accessible outside the cluster
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
