apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
spec:
  rules:
    - http:
        paths:
          # 👇 frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

          # 👇 backend API (مهم جدًا)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000