apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
spec:
  rules:
    - http:
        paths:
          # 👇 API + Swagger + OpenAPI
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000

          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000

          - path: /redoc
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000

          - path: /openapi.json   # 🔥 ده المهم جدًا
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000

          # 👇 frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80