# ════════════════════════════════════════════════════════════════
#  Frontend — Deployment + NodePort Service
#
#  The Nginx container serves the React SPA on port 80 and
#  reverse-proxies /api/* to the backend ClusterIP Service.
#  NodePort 30080 makes the app reachable from outside the cluster
#  at  http://<EC2-PUBLIC-IP>:30080
# ════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ahmed1707hamed/ecommerce-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20

---
# NodePort — accessible from outside the cluster
# Users hit:  http://<EC2-PUBLIC-IP>:30080
# Nginx inside the container resolves /api/* → backend:5000 (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: default
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080    # Expose on EC2 port 30080 (ensure SG allows TCP 30080)
