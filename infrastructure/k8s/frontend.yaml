apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ahmed1707hamed/ecommerce-frontend:latest
          imagePullPolicy: IfNotPresent   # 🔥 مهم

          ports:
            - containerPort: 80

          # 🔥 أخف resources ممكنة
          resources:
            requests:
              memory: "30Mi"
              cpu: "50m"
            limits:
              memory: "60Mi"
              cpu: "100m"

          # ❌ شيلنا الـ probes مؤقتًا
          # لما الدنيا تستقر نرجعهم

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: default
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080