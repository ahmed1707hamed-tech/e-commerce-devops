apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ahmed7amed9/backend
          env:
            - name: DATABASE_URL
              value: postgres://admin:admin@postgres:5432/ecommerce
          ports:
            - containerPort: 5000

          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for database..."
              sleep 10
              echo "Running migrations/seed..."
              python app/seed.py || true
              echo "Starting backend..."
              uvicorn app.main:app --host 0.0.0.0 --port 5000

---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30007